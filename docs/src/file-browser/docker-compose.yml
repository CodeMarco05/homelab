services:
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
#    ports:
#      - "10400:10400"
    volumes:
      - ./files:/srv
      - ./database:/database
      - ./config:/config
    environment:
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`<filebrowser-url>`)"
      - "traefik.http.routers.filebrowser.entrypoints=websecure"
      - "traefik.http.routers.filebrowser.tls=true"
      - "traefik.http.routers.filebrowser.tls.certresolver=letsencrypt"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=10400"

networks:
  traefik:
    external: true
    name: traefik